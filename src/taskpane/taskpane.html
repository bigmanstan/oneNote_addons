<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Beautiful Mind Maps</title>
    
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        body, html { margin:0; padding:0; height:100%; font-family:Segoe UI, sans-serif; background:#f8f9fa; overflow:hidden; }
        #header { background:#0078d4; color:white; padding:16px; font-size:20px; font-weight:600; text-align:center; }
        .controls { padding:12px; background:#f1f1f1; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; }
        
        #mindmap {
            flex: 1;
            margin: 15px;
            padding: 40px 20px;
            background: white;
            border: 4px solid #0078d4;
            border-radius: 16px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            min-height: 500px;
        }

        .node {
            padding: 16px 32px;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            font-weight: 600;
            text-align: center;
            min-width: 180px;
            cursor: pointer;
            border: 4px solid #0078d4;
            transition: all 0.25s;
        }

        .node:hover { transform: scale(1.08); }
        .node.selected { border-color: #ff9800; box-shadow: 0 0 0 6px rgba(255,152,0,0.35); }
        .node.root { background: #e3f2fd; font-size: 19px; padding: 20px 40px; }

        button { padding: 11px 22px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #0078d4; color: white; }
        #error, #status { padding: 12px; margin: 10px 15px; border-radius: 8px; text-align: center; }
        #error { color: #d32f2f; background: #ffebee; display: none; }
        #status { color: #0066cc; background: #e3f2fd; }
    </style>
</head>
<body>
    <div id="header">✦ Beautiful Mind Maps</div>
    
    <div class="controls">
        <input id="nodeText" placeholder="New node text..." style="width:300px; padding:11px; font-size:15px;">
        <button onclick="addChild()" class="btn-primary">➕ Add Child</button>
        <button onclick="insertToOneNote()" class="btn-primary">📤 Insert to OneNote</button>
        <button onclick="resetMap()" class="btn-primary">Reset</button>
    </div>

    <div id="status">Loading mind map...</div>
    <div id="mindmap"></div>
    <div id="error"></div>

    <script src="taskpane.js"></script>
</body>
</html>
